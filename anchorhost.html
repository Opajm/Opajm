<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>opime.online -> AnchorHost</title>
    <link rel="icon" type="image/x-icon" href="https://github.com/Opajm/Opajm/blob/main/logo.png?raw=true">
    <link rel="stylesheet" href="style.css">
    <style>
        .redirect-notice {
            background: #0d0d10c9;
            border-radius: 1.8rem;
            padding: 3rem;
            margin: 2rem 0;
            border-left: 4px solid #6a6a7a;
            text-align: center;
        }
        .redirect-notice h1 {
            font-size: 2.2rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(120deg, #e8e8f0, #b0b0c0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .warning-box {
            background: #111115cc;
            border: 1px solid #5a5a6a;
            border-radius: 1rem;
            padding: 1.5rem;
            margin: 1.5rem 0;
            color: #ccccdd;
        }
        .timer {
            font-size: 1.4rem;
            font-weight: bold;
            color: #9f9faf;
            margin: 20px 0;
            font-family: monospace;
        }
        .redirect-options {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        .redirect-btn {
            display: inline-block;
            text-decoration: none;
            padding: 0.85rem 2rem;
            font-weight: 600;
            border-radius: 60px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        .redirect-btn.primary {
            background: #2a2a32;
            border: 1px solid #6a6a7a;
            color: #e0e0ec;
        }
        .redirect-btn.primary:hover {
            background: #3a3a44;
            transform: translateY(-2px);
        }
        .redirect-btn.secondary {
            background: #151518;
            border: 1px solid #4a4a58;
            color: #ccccdd;
        }
        .redirect-btn.secondary:hover {
            background: #25252c;
        }
        @media (max-width: 768px) {
            .redirect-notice {
                padding: 1.5rem;
            }
            .redirect-notice h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="dark-bg">
        <nav class="sticky-nav">
            <div class="nav-container">
                <div class="nav-left">
                    <img src="logo.png" alt="opime.online Logo" class="logo-img" onerror="this.onerror=null; this.src='https://github.com/Opajm/Opajm/blob/main/logo.png?raw=true';">
                    <a href="index.html" class="home-link">⌂ back to opime.online</a>
                </div>
                <div class="nav-right">
                    <a href="index.html#main-section" class="nav-link">About project</a>
                    <a href="index.html#support-contact" class="nav-link">Support</a>
                    <a href="#" class="nav-link" id="moreSoonRedirect"><span class="badge-soon">More comming soon...</span></a>
                </div>
            </div>
        </nav>

        <main class="main-panel">
            <div class="redirect-notice">
                <h1>🔗 Redirecting to AnchorHost</h1>
                
                <div class="warning-box">
                    <p><strong>⚠️ Notice:</strong> AnchorHost is an external hosting provider.</p>
                </div>
                
                <div class="timer" id="countdown">Automatic redirect in: 15</div>
                
                <div class="redirect-options">
                    <a href="https://anchorhost.eu" class="redirect-btn primary" id="redirectLink">
                        🔗 Go to AnchorHost
                    </a>
                    <a href="index.html" class="redirect-btn secondary">
                        ↩️ Return to opime.online
                    </a>
                </div>
            </div>
            
            <footer>
                <p>opime.online</p>
            </footer>
        </main>
    </div>

    <script>
        let countdown = 15;
        const countdownElement = document.getElementById('countdown');
        const redirectLink = document.getElementById('redirectLink');
        
        function updateCountdown() {
            countdownElement.textContent = `Automatic redirect in: ${countdown}`;
            if (countdown === 0) {
                window.location.href = 'https://anchorhost.eu';
            } else {
                countdown--;
                setTimeout(updateCountdown, 1000);
            }
        }
        
        updateCountdown();
        
        redirectLink.addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = 'https://anchorhost.eu';
        });
        
        const moreBtn = document.getElementById('moreSoonRedirect');
        if (moreBtn) {
            moreBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const toast = document.createElement('div');
                toast.textContent = '✨ More coming soon!';
                toast.style.position = 'fixed';
                toast.style.bottom = '24px';
                toast.style.left = '50%';
                toast.style.transform = 'translateX(-50%)';
                toast.style.backgroundColor = '#1a1a20e6';
                toast.style.color = '#e0e0ec';
                toast.style.padding = '12px 28px';
                toast.style.borderRadius = '60px';
                toast.style.zIndex = '9999';
                toast.style.border = '1px solid #4a4a58';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2800);
            });
        }
    </script>
</body>
</html>
